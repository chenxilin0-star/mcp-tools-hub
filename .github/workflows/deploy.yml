name: Build and Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}

      - name: Deploy to Cloudflare Pages
        run: |
          DEPLOYMENT=$(curl -s -X POST \
            "https://api.cloudflare.com/client/v4/accounts/${{ secrets.CLOUDFLARE_ACCOUNT_ID }}/pages/projects/mcp-tools-hub/deployments" \
            -H "Authorization: Bearer ${{ secrets.CLOUDFLARE_PAGES_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{"build_config":{"build_command":"","destination_dir":""},"source":{"type":"direct_upload"}}')
          echo "Deployment response: $DEPLOYMENT"
          echo "Deployment: $(echo $DEPLOYMENT | python3 -c 'import sys,json; d=json.load(sys.stdin); r=d.get("result",{}); print(r.get("id"), r.get("url"))')"
